name: Instruction Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RISCV_TOOLCHAIN_URL: https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases/download/v15.2.0-1/xpack-riscv-none-elf-gcc-15.2.0-1-linux-x64.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache RISC-V toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /opt/riscv
        key: riscv-toolchain-${{ env.RISCV_TOOLCHAIN_URL }}

    - name: Download prebuilt RISC-V toolchain
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        mkdir -p /opt/riscv
        curl -L "${RISCV_TOOLCHAIN_URL}" -o /tmp/riscv-toolchain.tar.gz
        tar -xzf /tmp/riscv-toolchain.tar.gz -C /opt/riscv --strip-components=1

    - name: Add toolchain to PATH and env
      run: |
        echo "/opt/riscv/bin" >> "$GITHUB_PATH"
        echo "RISCV=/opt/riscv/bin" >> "$GITHUB_ENV"
        echo "GCC=riscv-none-elf" >> "$GITHUB_ENV"

    - name: Verify toolchain
      run: ${RISCV} --version

    - name: Build and run instruction tests
      run: |
        set -e
        bash validation/scripts/test_instructions.sh
